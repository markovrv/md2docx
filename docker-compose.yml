services:
  web:
    build: .
    container_name: md2docx
    ports:
      - "5000:5000"
    environment:
      - PRODUCTION=1
      - MPLBACKEND=Agg
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
